<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tabungan Bareng</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icons/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="theme-color" content="#ba2f66">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tabungan">
<style>
  :root {
    --accent: #ba2f66;
    --accent-bg: #c2336a;
    --accent-dim: #fce4ec;
    --bg: #f7f6f9;
    --card: #ffffff;
    --text: #1c1b1f;
    --muted: #5c5964;
    --border: #ebe8ef;
    --track: #f0edf3;
    --danger: #c22f2f;
    --ok: #1a7a43;
    --shadow: 0 1px 2px rgba(20,16,30,0.04), 0 6px 20px rgba(20,16,30,0.06);
    --shadow-sm: 0 1px 2px rgba(20,16,30,0.05);
    --radius: 16px;
    --radius-sm: 10px;
    --radius-lg: 20px;
    --fs-xs: 0.75rem;
    --fs-sm: 0.8125rem;
    --fs-base: 0.875rem;
    --fs-md: 1rem;
    --fs-lg: 1.25rem;
    --fs-xl: 2rem;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent: #f0658c;
      --accent-bg: #c2336a;
      --accent-dim: #3a1f2a;
      --bg: #131217;
      --card: #1c1b22;
      --text: #f1eef4;
      --muted: #9a96a3;
      --border: #2c2a33;
      --track: #29262f;
      --danger: #ff8787;
      --ok: #1f9d55;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
    }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }
  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  button, input { font-family: inherit; }

  /* ── Password gate ── */
  #gate {
    position: fixed; inset: 0; z-index: 60; background: var(--bg);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #gate .box { width: 100%; max-width: 320px; text-align: center; }
  #gate .box h1 { font-size: var(--fs-lg); margin: 0 0 6px; letter-spacing: -0.01em; font-weight: 700; }
  #gate .box p { color: var(--muted); font-size: 0.9rem; margin: 0 0 20px; }
  #gate form { display: flex; flex-direction: column; gap: 10px; }

  /* ── App shell ── */
  #app { display: none; padding-bottom: calc(96px + env(safe-area-inset-bottom)); }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; max-width: 520px; margin: 0 auto;
  }
  .topbar .brand { font-weight: 700; font-size: var(--fs-md); letter-spacing: -0.01em; }
  .topbar .brand span { color: var(--accent); }
  .icon-btn {
    background: none; border: none; color: var(--muted); font-size: var(--fs-md); cursor: pointer;
    width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    transition: background .15s ease;
  }
  .icon-btn:hover { background: var(--track); }
  .icon-btn:active, .tx-del:active { background: var(--track); }

  main { max-width: 520px; margin: 0 auto; padding: 0 16px; }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(155deg, var(--accent-bg), #8f2454 120%);
    color: white; border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .hero .hero-label { font-size: var(--fs-sm); opacity: 0.92; }
  .hero .hero-amount { display: block; font-size: var(--fs-xl); font-weight: 700; letter-spacing: -0.02em; margin-top: 0; line-height: 1.1; }
  .hero-target { margin-top: 16px; }
  .progress-row { display: flex; justify-content: space-between; font-size: var(--fs-xs); margin-bottom: 8px; }
  .hero-target .progress-row { opacity: 0.92; }
  .hero-bar { height: 8px; background: rgba(255,255,255,0.28); border-radius: 6px; overflow: hidden; }
  .hero-bar > div { height: 100%; background: white; border-radius: 6px; transition: width .4s ease; }
  .hero-people { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .chip {
    background: rgba(0,0,0,0.22); border-radius: 999px; padding: 6px 12px; font-size: var(--fs-xs);
    display: flex; gap: 6px; align-items: center;
  }
  .chip b { font-weight: 700; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; background: var(--track); border-radius: 12px; padding: 4px; margin-bottom: 16px; }
  .tab {
    flex: 1; border: none; background: none; padding: 8px; border-radius: var(--radius-sm); font-size: var(--fs-sm);
    color: var(--muted); font-weight: 600; cursor: pointer; transition: background .15s, color .15s;
    min-height: 44px; display: flex; align-items: center; justify-content: center;
  }
  .tab.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); }
  .tab:active:not(.active), .mtab:active:not(.active) { background: var(--track); }

  .card {
    background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .panel-title { font-size: var(--fs-md); font-weight: 700; margin: 0 0 12px; }

  .empty { color: var(--muted); text-align: center; padding: 28px 12px; font-size: var(--fs-sm); }

  /* ── Riwayat ── */
  .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .tx-item:last-child { border-bottom: none; }
  .tx-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
  }
  .tx-avatar--a { background: var(--accent-dim); color: var(--accent); }
  .tx-avatar--b { background: var(--track); color: var(--muted); }
  .tx-row { display: flex; gap: 8px; align-items: center; min-width: 0; }
  .tx-info { min-width: 0; }
  .tx-info .main { font-weight: 600; font-size: var(--fs-base); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-info small { color: var(--muted); font-size: var(--fs-xs); }
  .tx-amount { font-weight: 700; font-size: var(--fs-base); white-space: nowrap; }
  .tx-del {
    background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; flex-shrink: 0;
    min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 8px;
    transition: background .15s ease, color .15s ease;
  }
  .tx-del:hover { background: var(--track); color: var(--danger); }

  /* ── Statistik ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-tile { background: var(--track); border-radius: var(--radius); padding: 12px; }
  .stat-tile .k { font-size: var(--fs-xs); color: var(--muted); }
  .stat-tile .v { font-size: 1.05rem; font-weight: 700; margin-top: 2px; }
  .person-stat { padding: 12px 0; border-top: 1px solid var(--border); }
  .person-stat:first-child { border-top: none; }
  .person-stat .label { display: flex; justify-content: space-between; font-size: var(--fs-base); margin-bottom: 8px; }
  .person-stat .label b { font-weight: 700; }
  .bar { height: 7px; background: var(--track); border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
  .bar > div { height: 100%; background: var(--accent); border-radius: 6px; transition: width .4s ease; }
  .mini-stats { display: flex; gap: 12px; font-size: var(--fs-xs); color: var(--muted); flex-wrap: wrap; }
  .mini-stats b { color: var(--text); }

  /* ── Target ── */
  .target-form { display: flex; gap: 8px; margin-top: 16px; }
  .target-form input { flex: 1; }

  /* ── Forms ── */
  input {
    font-size: var(--fs-base); padding: 12px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg); color: var(--text); width: 100%; min-height: 44px;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  input::placeholder { color: var(--muted); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn:focus-visible, .fab:focus-visible { outline-offset: 3px; }
  button.primary {
    background: var(--accent-bg); color: white; border: none; font-weight: 600; cursor: pointer;
    padding: 12px 16px; border-radius: var(--radius-sm); font-size: var(--fs-base); min-height: 44px;
    transition: transform .12s ease, opacity .15s ease;
  }
  button.primary:active { transform: scale(0.98); }
  button.primary:disabled { filter: brightness(0.85); cursor: not-allowed; }
  button.ghost {
    background: none; border: 1px solid var(--border); color: var(--text); font-weight: 600; cursor: pointer;
    padding: 12px 16px; border-radius: var(--radius-sm); font-size: var(--fs-base); min-height: 44px;
    transition: background .15s ease, border-color .15s ease;
  }
  button.ghost:hover { background: var(--track); }

  /* ── FAB ── */
  .fab {
    position: fixed; right: 20px; bottom: calc(24px + env(safe-area-inset-bottom)); width: 58px; height: 58px; border-radius: 50%;
    background: var(--accent-bg); color: white; border: none; font-size: 1.6rem; cursor: pointer;
    box-shadow: 0 6px 20px rgba(194,51,106,0.45); z-index: 20; display: flex; align-items: center; justify-content: center;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .fab:hover { transform: scale(1.05); box-shadow: 0 8px 22px rgba(194,51,106,0.55); }
  .fab:active { transform: scale(0.94); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(10,8,14,0.45); z-index: 40;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; transition: opacity .2s ease;
  }
  .modal-overlay[hidden] { display: none; }
  .modal-overlay.open { opacity: 1; }
  .modal {
    background: var(--card); width: 100%; max-width: 480px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); max-height: 88vh; overflow-y: auto;
    transform: translateY(24px); opacity: 0; transition: transform .2s ease, opacity .2s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); opacity: 1; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-header h3 { margin: 0; font-size: var(--fs-md); font-weight: 700; }
  .mtabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .mtab {
    flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg);
    color: var(--muted); font-weight: 600; font-size: var(--fs-sm); cursor: pointer;
    min-height: 44px; display: flex; align-items: center; justify-content: center;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .mtab.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  form.inline { display: flex; flex-direction: column; gap: 12px; }
  .msg { font-size: var(--fs-sm); text-align: center; min-height: 1.2em; }
  .msg.error { color: var(--danger); }
  .msg.ok { color: var(--ok); }
  .tab-panel, #mtab-manual, #mtab-scan { animation: panelIn .18s ease; }
  @keyframes panelIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* ── Scan panel ── */
  #scanDropzone {
    border: 2px dashed var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center;
    color: var(--muted); cursor: pointer; font-size: var(--fs-sm);
    transition: border-color .15s ease, color .15s ease;
  }
  #scanDropzone:hover { border-color: var(--accent); color: var(--accent); }
  #scanPreview {
    width: 100%; border-radius: var(--radius); margin-bottom: 12px; max-height: 260px; object-fit: cover;
    opacity: 0; transition: opacity .25s ease;
  }
  #scanPreview:not([hidden]) { opacity: 1; }
  #scanStatus { text-align: center; font-size: var(--fs-sm); color: var(--muted); margin-top: 10px; }
  .spinner {
    width: 18px; height: 18px; border: 2.5px solid var(--track); border-top-color: var(--accent);
    border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; vertical-align: -4px; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed; left: 50%; bottom: calc(24px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(12px); opacity: 0;
    transition: transform .22s cubic-bezier(.34,1.56,.64,1), opacity .18s ease;
    background: var(--text); color: var(--bg); padding: 12px 16px; border-radius: var(--radius); font-size: var(--fs-sm);
    z-index: 80; box-shadow: var(--shadow); max-width: 90vw;
  }
  #toast[hidden] { display: none; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.error { background: #c22f2f; color: #fff; }
</style>
</head>
<body>

<div id="gate">
  <div class="box">
    <h1>💕 Tabungan Bareng</h1>
    <p>Masukin password buat buka dashboard</p>
    <form id="gateForm">
      <input type="password" id="gatePassword" placeholder="Password" autofocus required>
      <button type="submit" class="primary">Buka Dashboard</button>
      <div class="msg error" id="gateMsg"></div>
    </form>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="brand">💕 <span>Tabungan</span> Bareng</div>
    <div style="display:flex;gap:4px;align-items:center">
      <button class="ghost" id="installBtn" hidden style="padding:8px 12px;min-height:36px;font-size:0.8rem">📲 Install</button>
      <button class="icon-btn" id="refreshBtn" title="Refresh" aria-label="Refresh">⟳</button>
      <button class="icon-btn" id="logoutBtn" title="Ganti password" aria-label="Ganti password">⎋</button>
    </div>
  </div>

  <main>
    <section class="hero" id="heroCard">
      <span class="hero-label">Total Saldo</span>
      <span class="hero-amount" id="heroTotal">—</span>
      <div class="hero-target" id="heroTarget"></div>
      <div class="hero-people" id="heroPeople"></div>
    </section>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="riwayat" role="tab" aria-selected="true">📋 Riwayat</button>
      <button class="tab" data-tab="statistik" role="tab" aria-selected="false">📈 Statistik</button>
      <button class="tab" data-tab="target" role="tab" aria-selected="false">🎯 Target</button>
    </nav>

    <section class="card tab-panel" id="panel-riwayat" role="tabpanel">
      <h2 class="panel-title">Riwayat Transaksi</h2>
      <div id="riwayatBody"></div>
    </section>

    <section class="card tab-panel" id="panel-statistik" hidden role="tabpanel">
      <h2 class="panel-title">Statistik</h2>
      <div id="statistikBody"></div>
    </section>

    <section class="card tab-panel" id="panel-target" hidden role="tabpanel">
      <h2 class="panel-title">Target Tabungan</h2>
      <div id="targetBody"></div>
      <form class="inline target-form" id="targetForm">
        <input type="text" id="targetNominal" placeholder="mis. 5jt" enterkeyhint="done" required>
        <button type="submit" class="primary">Set</button>
      </form>
      <div class="msg" id="targetMsg"></div>
    </section>
  </main>

  <button class="fab" id="fabNabung" title="Tambah tabungan" aria-label="Tambah tabungan">+</button>
</div>

<div class="modal-overlay" id="modalOverlay" hidden>
  <div class="modal">
    <div class="modal-header">
      <h3>Tambah Tabungan</h3>
      <button class="icon-btn" id="modalClose" aria-label="Tutup">✕</button>
    </div>
    <div class="mtabs" role="tablist">
      <button class="mtab active" data-mtab="manual" role="tab" aria-selected="true">✏️ Manual</button>
      <button class="mtab" data-mtab="scan" role="tab" aria-selected="false">📸 Scan Foto</button>
    </div>

    <div id="mtab-manual" role="tabpanel">
      <form class="inline" id="nabungForm">
        <input type="text" id="nabungNominal" placeholder="Nominal, mis. 75rb atau 1jt" enterkeyhint="next" required>
        <input type="text" id="nabungNama" list="namaList" placeholder="Nama" enterkeyhint="next" required>
        <datalist id="namaList"></datalist>
        <input type="text" id="nabungKeterangan" placeholder="Keterangan (opsional)" enterkeyhint="done">
        <button type="submit" class="primary" id="nabungSubmit">Simpan</button>
        <div class="msg" id="nabungMsg"></div>
      </form>
    </div>

    <div id="mtab-scan" hidden role="tabpanel">
      <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
      <div id="scanDropzone">📸<br>Tap buat pilih atau foto struk/transfer</div>
      <img id="scanPreview" hidden>
      <div id="scanStatus"></div>
    </div>
  </div>
</div>

<div id="toast" hidden></div>

<script>
const IDR = (n) => new Intl.NumberFormat("id-ID", { style: "currency", currency: "IDR", minimumFractionDigits: 0 }).format(n);
const fmtDate = (iso) => new Date(iso).toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" });
const parseAmount = (str) =>
  parseInt(String(str).toLowerCase().replace(/\./g, "").replace(/rb|ribu/g, "000").replace(/jt|juta/g, "000000").replace(/[^0-9]/g, ""));
const initials = (s) => (s || "?").trim().slice(0, 2).toUpperCase();

const PW_KEY = "tabungan_dashboard_password";
const NAMA_KEY = "tabungan_dashboard_nama";
const AUTH_KEY = "tabungan_dashboard_auth_at";
const AUTH_MAX_AGE_MS = 30 * 24 * 60 * 60 * 1000; // auto-logout kalau nggak dipakai 30 hari
let lastData = null;

// ── toast ──
let toastTimer;
function toast(msg, kind = "ok") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.toggle("error", kind === "error");
  el.hidden = false;
  el.offsetHeight;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.remove("show");
    setTimeout(() => { el.hidden = true; }, 200);
  }, 2600);
}

// ── api wrapper ──
async function api(path, opts = {}) {
  const res = await fetch(path, {
    ...opts,
    headers: { "Content-Type": "application/json", ...(opts.headers || {}), "X-Dashboard-Password": localStorage.getItem(PW_KEY) || "" },
  });
  if (res.status === 401) {
    localStorage.removeItem(PW_KEY);
    localStorage.removeItem(AUTH_KEY);
    showGate("Password salah, coba lagi.");
    throw new Error("unauthorized");
  }
  if (res.ok) localStorage.setItem(AUTH_KEY, String(Date.now()));
  return res.json();
}

function showGate(msg) {
  document.getElementById("gate").style.display = "flex";
  document.getElementById("app").style.display = "none";
  document.getElementById("gateMsg").textContent = msg || "";
}

document.getElementById("gateForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  localStorage.setItem(PW_KEY, document.getElementById("gatePassword").value);
  try {
    await loadDashboard();
    document.getElementById("gate").style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch (err) { /* showGate udah dipanggil di api() kalau 401 */ }
});

document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem(PW_KEY);
  localStorage.removeItem(AUTH_KEY);
  showGate();
});

document.getElementById("refreshBtn").addEventListener("click", async (e) => {
  e.currentTarget.style.animation = "spin .6s linear";
  await loadDashboard();
  toast("🔄 Diperbarui");
  e.currentTarget.style.animation = "";
});

// ── PWA: install prompt + service worker ──
function isStandalone() {
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
}
let deferredInstallPrompt = null;
const installBtn = document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  if (!isStandalone()) installBtn.hidden = false;
});
installBtn.addEventListener("click", async () => {
  if (!deferredInstallPrompt) return;
  installBtn.hidden = true;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
});
window.addEventListener("appinstalled", () => { installBtn.hidden = true; });

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
}

// ── tabs ──
document.querySelectorAll(".tab").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((b) => { b.classList.remove("active"); b.setAttribute("aria-selected", "false"); });
    document.querySelectorAll(".tab-panel").forEach((p) => (p.hidden = true));
    btn.classList.add("active");
    btn.setAttribute("aria-selected", "true");
    document.getElementById("panel-" + btn.dataset.tab).hidden = false;
  });
});

// ── render ──
function renderHero(saldo) {
  document.getElementById("heroTotal").textContent = IDR(saldo.total);
  const targetEl = document.getElementById("heroTarget");
  targetEl.innerHTML = saldo.target > 0 ? `
    <div class="progress-row"><span>Target ${IDR(saldo.target)}</span><b>${saldo.targetPct}%</b></div>
    <div class="hero-bar"><div data-pct="${saldo.targetPct}" style="width:0%"></div></div>
  ` : "";
  const peopleEl = document.getElementById("heroPeople");
  peopleEl.innerHTML = saldo.empty ? "" : saldo.perOrang.map(p => `<div class="chip">${p.nama} <b>${IDR(p.total)}</b></div>`).join("");
}

function renderRiwayat(riwayat) {
  const el = document.getElementById("riwayatBody");
  if (!riwayat.length) { el.innerHTML = `<div class="empty">📭 Belum ada transaksi<br>Tap tombol + buat mulai nabung</div>`; return; }
  const firstNama = lastData?.saldo?.perOrang?.[0]?.nama;
  el.innerHTML = riwayat.map(t => {
    const who = t.nama === firstNama ? "a" : "b";
    return `
    <div class="tx-item">
      <div class="tx-row">
        <div class="tx-avatar tx-avatar--${who}">${initials(t.nama)}</div>
        <div class="tx-info">
          <div class="main">${t.nama}${t.keterangan ? " · " + t.keterangan : ""}</div>
          <small>${fmtDate(t.created_at)}</small>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:2px">
        <div class="tx-amount">${IDR(t.jumlah)}</div>
        <button class="tx-del" data-id="${t.id}" title="Hapus" aria-label="Hapus transaksi ${t.nama}">🗑</button>
      </div>
    </div>
  `;
  }).join("");
  el.querySelectorAll(".tx-del").forEach((btn) => btn.addEventListener("click", () => hapusTransaksi(parseInt(btn.dataset.id))));
}

function renderStatistik(s) {
  const el = document.getElementById("statistikBody");
  if (s.empty) { el.innerHTML = `<div class="empty">📭 Belum ada transaksi buat dianalisis<br>Mulai nabung dulu, statistik muncul otomatis</div>`; return; }
  let html = `<div style="font-size:0.78rem;color:var(--muted);margin:-6px 0 12px">Nabung sejak ${fmtDate(s.sejakTanggal)}</div><div class="stat-grid">
    <div class="stat-tile"><div class="k">Rata-rata/hari</div><div class="v">${IDR(s.avgHarian)}</div></div>
    <div class="stat-tile"><div class="k">Hari menabung</div><div class="v">${s.hariMenabung} hari</div></div>
    <div class="stat-tile"><div class="k">Total transaksi</div><div class="v">${s.totalTransaksi}x</div></div>
    <div class="stat-tile"><div class="k">Estimasi target</div><div class="v">${s.estimasiHari === null ? "—" : (s.estimasiHari > 0 ? s.estimasiHari + " hari lagi" : "Tercapai 🎉")}</div></div>
  </div>`;
  html += s.perOrang.map(p => `
    <div class="person-stat">
      <div class="label"><span>${p.nama}</span><b>${IDR(p.total)} · ${p.count}x</b></div>
      <div class="bar"><div data-pct="${p.pct}" style="width:0%"></div></div>
      <div class="mini-stats">
        <span>Terbesar <b>${IDR(p.max)}</b></span>
        <span>Terkecil <b>${IDR(p.min)}</b></span>
        <span>Rata-rata/transaksi <b>${IDR(p.avg)}</b></span>
      </div>
    </div>
  `).join("");
  el.innerHTML = html;
}

function renderTarget(t) {
  const el = document.getElementById("targetBody");
  el.innerHTML = t.isSet ? `
    <div class="progress-row">
      <span>Target ${IDR(t.jumlah)}</span><b>${t.pct}%</b>
    </div>
    <div class="bar"><div data-pct="${t.pct}" style="width:0%"></div></div>
    <div class="msg${t.sisa > 0 ? '' : ' ok'}" style="text-align:left;margin-top:6px">${t.sisa > 0 ? "Sisa " + IDR(t.sisa) : "Target tercapai! 🎉"}</div>
  ` : `<div class="empty">🎯 Belum ada target<br>Set target biar progressnya kelihatan</div>`;
}

function updateNamaList(perOrang) {
  document.getElementById("namaList").innerHTML = perOrang.map(p => `<option value="${p.nama}">`).join("");
}

async function loadDashboard() {
  const data = await api("/api/dashboard?limit=30");
  lastData = data;
  renderHero(data.saldo);
  renderRiwayat(data.riwayat);
  renderStatistik(data.statistik);
  renderTarget(data.target);
  updateNamaList(data.saldo.perOrang);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll("[data-pct]").forEach(bar => bar.style.width = bar.dataset.pct + "%");
  }));
}

// ── modal ──
const overlay = document.getElementById("modalOverlay");
function openModal() {
  overlay.hidden = false;
  overlay.offsetHeight;
  overlay.classList.add("open");
  document.getElementById("nabungNama").value = localStorage.getItem(NAMA_KEY) || "";
  document.getElementById("nabungMsg").textContent = "";
}
function closeModal() {
  overlay.classList.remove("open");
  setTimeout(() => { overlay.hidden = true; resetScanUI(); }, 200);
}
document.getElementById("fabNabung").addEventListener("click", openModal);
document.getElementById("modalClose").addEventListener("click", closeModal);
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });

document.querySelectorAll(".mtab").forEach((btn) => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mtab").forEach((b) => { b.classList.remove("active"); b.setAttribute("aria-selected", "false"); });
    btn.classList.add("active");
    btn.setAttribute("aria-selected", "true");
    const isManual = btn.dataset.mtab === "manual";
    document.getElementById("mtab-manual").hidden = !isManual;
    document.getElementById("mtab-scan").hidden = isManual;
  });
});
function switchToManualTab() {
  document.querySelector('.mtab[data-mtab="manual"]').click();
}

// ── nabung form ──
document.getElementById("nabungForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msgEl = document.getElementById("nabungMsg");
  const submitBtn = document.getElementById("nabungSubmit");
  const jumlah = parseAmount(document.getElementById("nabungNominal").value);
  const nama = document.getElementById("nabungNama").value.trim();
  const keterangan = document.getElementById("nabungKeterangan").value.trim();
  if (isNaN(jumlah) || jumlah <= 0) { msgEl.className = "msg error"; msgEl.textContent = "Nominal belum valid — coba format kayak 75rb atau 1jt"; return; }
  localStorage.setItem(NAMA_KEY, nama);
  submitBtn.disabled = true;
  try {
    const res = await api("/api/dashboard", { method: "POST", body: JSON.stringify({ action: "nabung", nama, jumlah, keterangan }) });
    if (!res.ok) { msgEl.className = "msg error"; msgEl.textContent = res.error; return; }
    document.getElementById("nabungForm").reset();
    document.getElementById("nabungNama").value = nama;
    closeModal();
    toast("✅ Tabungan tersimpan");
    await loadDashboard();
  } catch (err) { /* 401 udah ditangani */ }
  finally { submitBtn.disabled = false; }
});

async function hapusTransaksi(id) {
  if (!confirm("Yakin mau hapus transaksi ini?")) return;
  const item = document.querySelector(`.tx-del[data-id="${id}"]`)?.closest(".tx-item");
  try {
    const res = await api("/api/dashboard", { method: "POST", body: JSON.stringify({ action: "hapus", id }) });
    if (res.ok) {
      if (item) {
        item.style.transition = "opacity .2s ease, transform .2s ease";
        item.style.opacity = "0";
        item.style.transform = "translateX(12px)";
        await new Promise(r => setTimeout(r, 200));
      }
      toast("🗑 Transaksi dihapus");
      await loadDashboard();
    } else {
      toast("❌ Gagal hapus transaksi, coba lagi", "error");
    }
  } catch (err) { /* 401 udah ditangani */ }
}

// ── target form ──
document.getElementById("targetForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const msgEl = document.getElementById("targetMsg");
  const jumlah = parseAmount(document.getElementById("targetNominal").value);
  if (isNaN(jumlah) || jumlah <= 0) { msgEl.className = "msg error"; msgEl.textContent = "Nominal belum valid — coba format kayak 5jt"; return; }
  try {
    const res = await api("/api/dashboard", { method: "POST", body: JSON.stringify({ action: "target", jumlah }) });
    if (!res.ok) { msgEl.className = "msg error"; msgEl.textContent = res.error; return; }
    msgEl.className = "msg ok"; msgEl.textContent = "";
    document.getElementById("targetForm").reset();
    toast("🎯 Target diperbarui");
    await loadDashboard();
  } catch (err) { /* 401 udah ditangani */ }
});

// ── scan foto ──
const fileInput = document.getElementById("fileInput");
const scanDropzone = document.getElementById("scanDropzone");
const scanPreview = document.getElementById("scanPreview");
const scanStatus = document.getElementById("scanStatus");

scanDropzone.addEventListener("click", () => fileInput.click());

function resetScanUI() {
  fileInput.value = "";
  scanPreview.hidden = true;
  scanStatus.innerHTML = "";
  scanDropzone.hidden = false;
}

function resizeImageToJpegBase64(file, maxDim = 1280, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("read_failed"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("decode_failed"));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

fileInput.addEventListener("change", async () => {
  const file = fileInput.files?.[0];
  if (!file) return;

  scanDropzone.hidden = true;
  scanStatus.innerHTML = `<span class="spinner"></span>Membaca gambar...`;

  try {
    const dataUrl = await resizeImageToJpegBase64(file);
    scanPreview.src = dataUrl;
    scanPreview.hidden = false;
    scanStatus.innerHTML = `<span class="spinner"></span>Menganalisis nominal...`;

    const base64 = dataUrl.split(",")[1];
    const res = await api("/api/dashboard", { method: "POST", body: JSON.stringify({ action: "scan", image: base64, mimeType: "image/jpeg" }) });

    if (!res.ok) {
      scanStatus.innerHTML = res.error === "gambar terlalu besar"
        ? "❌ Foto kegedean, coba pakai foto lain yang lebih kecil."
        : "❌ Gagal memindai foto. Coba lagi, atau isi manual.";
      scanDropzone.hidden = false;
      fileInput.value = "";
      return;
    }
    if (!res.detected) {
      scanStatus.innerHTML = "❌ Nominal tidak terdeteksi. Coba foto lebih jelas, atau isi manual.";
      scanDropzone.hidden = false;
      fileInput.value = "";
      return;
    }

    document.getElementById("nabungNominal").value = res.jumlah;
    scanStatus.innerHTML = `✅ Terdeteksi <b>${IDR(res.jumlah)}</b> — cek & simpan di tab Manual`;
    switchToManualTab();
    document.getElementById("nabungKeterangan").focus();
  } catch (err) {
    if (err.message !== "unauthorized") {
      scanStatus.innerHTML = `❌ Gagal membaca gambar. Coba lagi.`;
      scanDropzone.hidden = false;
      fileInput.value = "";
    }
  }
});

// ── init ──
(function init() {
  const hadSession = !!localStorage.getItem(PW_KEY);
  const authAt = parseInt(localStorage.getItem(AUTH_KEY), 10);
  const expired = hadSession && (!authAt || (Date.now() - authAt) > AUTH_MAX_AGE_MS);

  if (expired) {
    localStorage.removeItem(PW_KEY);
    localStorage.removeItem(AUTH_KEY);
    showGate("Sesi login udah lewat 30 hari, masukin password lagi ya.");
  } else if (hadSession) {
    loadDashboard().then(() => {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
    }).catch(() => {});
  } else {
    showGate();
  }
})();
</script>
